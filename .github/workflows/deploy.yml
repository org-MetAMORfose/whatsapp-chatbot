name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: "Deploying to Lightsail"
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 15
    permissions:
      contents: read

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}

    steps:
      - uses: actions/checkout@v4

      - name: Wait for SSH
        run: |
          echo "${{ secrets.LIGHTSAIL_SSH_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key

          for i in $(seq 1 30); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
              -i /tmp/ssh_key \
              ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }} "echo ok"; then
              echo "SSH connection established"
              rm -f /tmp/ssh_key
              exit 0
            fi

            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done

          rm -f /tmp/ssh_key
          echo "SSH connection failed after 30 attempts"
          exit 1

      - name: Remove .git before copy
        run: rm -rf .git

      - name: Copy files to Lightsail
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          source: "."
          target: ${{ secrets.LIGHTSAIL_APP_PATH }}
          rm: false
          overwrite: true

      - name: Write .env and deploy
        uses: appleboy/ssh-action@v1.0.3

        env:
          LIGHTSAIL_APP_PATH: ${{ secrets.LIGHTSAIL_APP_PATH }}

          DATABASE_URL: ${{ secrets.DATABASE_URL }}

          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          LANGSMITH_ENDPOINT: ${{ secrets.LANGSMITH_ENDPOINT }}
          LANGSMITH_PROJECT: ${{ secrets.LANGSMITH_PROJECT }}
          LANGSMITH_TRACING: ${{ secrets.LANGSMITH_TRACING }}

          LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          REDIS_USERNAME: ${{ secrets.REDIS_USERNAME }}

          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          USE_TELEGRAM: ${{ secrets.USE_TELEGRAM }}
          USE_WHATSAPP: ${{ secrets.USE_WHATSAPP }}

          WHATSAPP_ACCESS_TOKEN: ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
          WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          WHATSAPP_VERIFY_TOKEN: ${{ secrets.WHATSAPP_VERIFY_TOKEN }}

        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}

          envs: LIGHTSAIL_APP_PATH,DATABASE_URL,LANGSMITH_API_KEY,LANGSMITH_ENDPOINT,LANGSMITH_PROJECT,LANGSMITH_TRACING,LOG_LEVEL,OPENAI_API_KEY,REDIS_PASSWORD,REDIS_USERNAME,POSTGRES_USER,POSTGRES_PASSWORD,TELEGRAM_BOT_TOKEN,USE_TELEGRAM,USE_WHATSAPP,WHATSAPP_ACCESS_TOKEN,WHATSAPP_PHONE_NUMBER_ID,WHATSAPP_VERIFY_TOKEN

          script: |
            set -e

            cd "$LIGHTSAIL_APP_PATH"

            cat > .env << EOF
            DATABASE_URL=$DATABASE_URL

            LANGSMITH_API_KEY=$LANGSMITH_API_KEY
            LANGSMITH_ENDPOINT=$LANGSMITH_ENDPOINT
            LANGSMITH_PROJECT=$LANGSMITH_PROJECT
            LANGSMITH_TRACING=$LANGSMITH_TRACING

            LOG_LEVEL=$LOG_LEVEL
            OPENAI_API_KEY=$OPENAI_API_KEY

            REDIS_DB=0
            REDIS_HOST=redis
            REDIS_PASSWORD=$REDIS_PASSWORD
            REDIS_PORT=6379
            REDIS_USERNAME=$REDIS_USERNAME

            POSTGRES_USER=$POSTGRES_USER
            POSTGRES_PASSWORD=$POSTGRES_PASSWORD
            POSTGRES_DB=chatbot

            TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN

            USE_TELEGRAM=$USE_TELEGRAM
            USE_WHATSAPP=$USE_WHATSAPP

            WHATSAPP_ACCESS_TOKEN=$WHATSAPP_ACCESS_TOKEN
            WHATSAPP_PHONE_NUMBER_ID=$WHATSAPP_PHONE_NUMBER_ID
            WHATSAPP_VERIFY_TOKEN=$WHATSAPP_VERIFY_TOKEN
            EOF

            sed -i 's/^[[:space:]]*//' .env

            if docker compose ps --services --filter status=running | grep -q "^chatbot$"; then
              echo "Stack already running — rebuilding chatbot service only"
              docker compose up -d --build chatbot
            else
              echo "Stack not running, starting full stack"
              docker compose up -d --build
            fi

            docker compose ps
            echo "Finished!"