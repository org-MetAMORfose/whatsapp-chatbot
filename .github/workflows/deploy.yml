name: Deploy

on:
  workflow_run:
    workflows: ["Build, Lint and Test"]      # 👈 nome exato do workflow anterior
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: "Deploying to EC2"
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Start EC2 Instance
        run: |
          aws ec2 start-instances --instance-ids ${{ secrets.EC2_INSTANCE_ID }}
          aws ec2 wait instance-running --instance-ids ${{ secrets.EC2_INSTANCE_ID }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}

      - name: Wait for SSH
        run: |
          for i in $(seq 1 30); do
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
              -i <(echo "${{ secrets.EC2_SSH_KEY }}") \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "echo ok" && break
            sleep 5
          done

      - name: Copy to EC2
        uses: appleboy/scp-action@ee72f71e5fa61b633a3dbf63820548d68e0d1c83 # v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "."
          target: ${{ secrets.EC2_APP_PATH }}
          rm: false
          overwrite: true

      - name: Deploy on EC2
        uses: appleboy/ssh-action@2ead5e36573005b21db35b4b7963bce7e0044d87 # v1.0.3
        env:
          EC2_APP_PATH: ${{ secrets.EC2_APP_PATH }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          LANGSMITH_ENDPOINT: ${{ secrets.LANGSMITH_ENDPOINT }}
          LANGSMITH_PROJECT: ${{ secrets.LANGSMITH_PROJECT }}
          LANGSMITH_TRACING: ${{ secrets.LANGSMITH_TRACING }}
          LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          REDIS_USERNAME: ${{ secrets.REDIS_USERNAME }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          USE_TELEGRAM: ${{ secrets.USE_TELEGRAM }},
          USE_WHATSAPP: ${{ secrets.USE_WHATSSAPP }}, 
          WHATSAPP_ACCESS_TOKEN: ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
          WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          WHATSAPP_VERIFY_TOKEN: ${{ secrets.WHATSAPP_VERIFY_TOKEN }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: EC2_APP_PATH,LANGSMITH_API_KEY,LANGSMITH_ENDPOINT,LANGSMITH_PROJECT,LANGSMITH_TRACING,LOG_LEVEL,OPENAI_API_KEY,REDIS_PASSWORD,REDIS_USERNAME,TELEGRAM_BOT_TOKEN,USE_TELEGRAM,USE_WHATSAPP,WHATSAPP_ACCESS_TOKEN,WHATSAPP_PHONE_NUMBER_ID,WHATSAPP_VERIFY_TOKEN
          script: |
            cd "$EC2_APP_PATH"

            cat > .env << EOF
            LANGSMITH_API_KEY=$LANGSMITH_API_KEY
            LANGSMITH_ENDPOINT=$LANGSMITH_ENDPOINT
            LANGSMITH_PROJECT=$LANGSMITH_PROJECT
            LANGSMITH_TRACING=$LANGSMITH_TRACING
            LOG_LEVEL=$LOG_LEVEL
            OPENAI_API_KEY=$OPENAI_API_KEY
            REDIS_DB=0
            REDIS_HOST=redis
            REDIS_PASSWORD=$REDIS_PASSWORD
            REDIS_PORT=6379
            REDIS_USERNAME=$REDIS_USERNAME
            TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN
            USE_WHATSAPP:$USE_TELEGRAM
            USE_WHATSAPP:$USE_WHATSAPP
            WHATSAPP_ACCESS_TOKEN=$WHATSAPP_ACCESS_TOKEN
            WHATSAPP_PHONE_NUMBER_ID=$WHATSAPP_PHONE_NUMBER_ID
            WHATSAPP_VERIFY_TOKEN=$WHATSAPP_VERIFY_TOKEN
            EOF

            # Se o container da API estiver rodando, apenas subsititui ela.
            # Caso não, subsititui tudo;
            if docker compose ps --services --filter status=running | grep -q "^chatbot$"; then
              echo "Stack already running, rebuilding chatbot service only"
              docker compose up -d --build chatbot
            else
              echo "Stack not running — starting full stack"
              docker compose up -d --build
            fi

            docker compose ps
            echo "Finished!"
