[meta]
name = "start"
description = "Entrada principal do atendimento, separando fluxo de paciente e profissional."

[nodes.start]
description = "Mensagem inicial e seleção do tipo de atendimento."
message = """Olá, tudo bem?

Você está conversando com o chatbot da Rede MetAMORfose. 😊

Caso tenha preenchido alguma informação incorretamente ou queira recomeçar o atendimento, basta enviar a palavra RESET a qualquer momento para reiniciar o fluxo.

Como posso ajudar você hoje?

Selecione uma das opções abaixo:"""
buttons = ["Sou paciente", "Sou profissional"]

[[nodes.start.transitions]]
target = "paciente_inicio"
conditions = ["sou paciente"]

[[nodes.start.transitions]]
target = "profissional_start"
conditions = ["sou profissional"]

[nodes.profissional_start]
description = "Entrada específica para profissionais."
message = """Você já faz parte da Rede MetAMORfose ou deseja participar do processo seletivo?"""
buttons = ["Processo seletivo", "Já sou da Rede", "FAQ"]

[[nodes.profissional_start.transitions]]
target = "lgpd"
conditions = ["processo seletivo"]

[[nodes.profissional_start.transitions]]
target = "profissional_rede_inicio"
conditions = ["ja sou da rede"]

[[nodes.profissional_start.transitions]]
target = "faq_inicio"
conditions = ["faq"]
