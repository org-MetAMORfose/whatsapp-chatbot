message = "Os dados estão corretos?"
buttons = ["Confirmar", "Corrigir"]

[[nodes.resumo_dados.transitions]]
target = "comprovante_registro"
conditions = ["confirmar"]

[[nodes.resumo_dados.transitions]]
target = "escolha_correcao"
