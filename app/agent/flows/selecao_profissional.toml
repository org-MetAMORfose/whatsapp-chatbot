[nodes.comprovante_registro]
description = "Solicitação de comprovante do registro, formação ou certificação."
actions = ["redis_update_professional_council_registration_document"]
message = """Agora envie uma foto, imagem ou documento que comprove seu registro, formação ou certificação profissional.

Pode ser carteira do conselho, certificado, declaração, diploma ou outro documento relacionado à sua atuação."""
input = "Imagem ou documento"

[[nodes.comprovante_registro.transitions]]
target = "confirmacao_envio"
conditions = []


[nodes.confirmacao_envio]
description = "Confirmação final antes de gravar no PostgreSQL."
message = """Deseja enviar sua solicitação para análise da equipe?"""
