[nodes.selecao_profissional_pagamento]
description = "Encerramento do fluxo de seleção profissional."
actions = [
  "postgres_register_professional_application",
  "sheets_register_professional",
  "postgres_set_professional_registration_state"
]
message = """Certo. Como você prefere? Via pix ou crédito? Via pix está em nome de Luiza Fogaça, a gestora da plataforma. A chave pix: contato@orgmetamorfose.com

Se preferir por crédito no site, a assinatura é faturada mensalmente no mesmo dia - mas você pode cancelar a qualquer momento se quiser - o link é https://orgmetamorfose.com.br/assinatura

Como o pagamento via Pix é feito fora do site, o sistema não consegue atualizar o selo de "ativo" automaticamente na tela do perfil. Mas, em nosso sistema interno, o perfil é confirmado e você aparece normalmente para os pacientes.

A única diferença prática é:
- No Cartão: A renovação é automática.
- No Pix: É necessário fazer o pagamento manualmente todo mês para renovar. Independentemente disso, seu acesso e o recebimento de novos pacientes estão totalmente garantidos.

Se, após a análise do processo seletivo, seu cadastro profissional não for aceito, o valor pago será reembolsado integralmente.

Por favor, envie o comprovante do Pix como imagem ou documento para finalizarmos a conferência."""
input = "Imagem ou documento"

[[nodes.selecao_profissional_pagamento.transitions]]
target = "selecao_profissional_end"
conditions = []

[nodes.selecao_profissional_end]
description = "Encerramento do fluxo de seleção profissional."
message = """Obrigada. Boas vindas ao nosso time da Rede MetAMORfose.

O próximo passo é criar seu perfil profissional em: https://www.orgmetamorfose.com.br/account/my-account

Finalizado o perfil, após 7 dias, as conexões com pacientes serão enviadas para o e-mail informado pelo endereço: no-reply@orgmetamorfosepro.com

Nós promovemos seu perfil e realizamos as conexões com pacientes, mas não interferimos nos agendamentos ou quantidade de sessões fechadas. Vamos verificar seu pagamento e seu registro e te retornamos. Você tem alguma dúvida?"""

buttons = ["Enviar feedback", "Dúvidas", "Encerrar"]

[[nodes.selecao_profissional_end.transitions]]
target = "feedback_inicio"
conditions = ["enviar feedback"]

[[nodes.selecao_profissional_end.transitions]]
target = "faq_inicio"
conditions = ["duvidas"]

[[nodes.selecao_profissional_end.transitions]]
target = "selecao_profissional_finalizado"
conditions = ["encerrar"]

[nodes.selecao_profissional_finalizado]
description = "Finalização do fluxo de seleção profissional."
message = "Atendimento encerrado. Obrigada pelo contato."
end = true
