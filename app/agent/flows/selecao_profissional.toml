[[nodes.confirmacao_envio.transitions]]
target = "cadastro_postgres"
conditions = ["enviar"]

[[nodes.confirmacao_envio.transitions]]
target = "escolha_correcao"
conditions = ["corrigir"]


[nodes.cadastro_postgres]
