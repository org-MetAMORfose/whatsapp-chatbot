[meta]
name = "selecao_profissional"
description = "Fluxo de contratação, coleta de informações e validação de profissionais."


[nodes.lgpd]
description = "Aviso de privacidade antes da coleta de dados."
message = """Antes de prosseguirmos, informamos que os dados fornecidos serão utilizados para avaliação do seu cadastro profissional e eventual formalização de parceria com a Rede MetAMORfose.

Ao continuar, você declara estar ciente de nossa Política de Privacidade."""
buttons = ["Concordo"]

[[nodes.lgpd.transitions]]
target = "explicacao_rede"
conditions = ["concordo"]


[nodes.explicacao_rede]
description = "Explicação breve sobre funcionamento da Rede."
actions = ["redis_create_professional_stage"]
message = """A Rede MetAMORfose conecta profissionais de saúde a pacientes que buscam atendimento online.

Você define o valor da sua consulta, recebe diretamente do paciente e possui autonomia para definir agenda, duração e forma de pagamento.

Gostaria de continuar?"""
buttons = ["Prosseguir"]

[[nodes.explicacao_rede.transitions]]
target = "nome_completo"
conditions = ["prosseguir"]


[nodes.nome_completo]
description = "Coleta do nome completo."
actions = ["redis_update_professional_name"]
message = "Qual é o seu nome completo?"
input = "Texto"

[[nodes.nome_completo.transitions]]
target = "area_atuacao"
conditions = []


[nodes.area_atuacao]
description = "Coleta da área principal de atuação."
actions = ["redis_update_professional_area"]
message = "Qual é sua principal área de atuação?"
buttons = [
  "Nutrição",
  "Clínico geral",
  "Psiquiatria",
  "Psicoterapia",
  "Psicanálise",
  "Terapia holística",
  "Outra"
]

[[nodes.area_atuacao.transitions]]
target = "orientacao_medica_rqe"
conditions = ["clinico geral", "psiquiatria"]

[[nodes.area_atuacao.transitions]]
target = "abordagem_psicoterapia"
conditions = ["psicoterapia"]

[[nodes.area_atuacao.transitions]]
target = "genero"
conditions = ["nutricao", "psicanalise", "terapia holistica"]

[[nodes.area_atuacao.transitions]]
target = "area_atuacao_outro"
conditions = ["outra"]


[nodes.area_atuacao_outro]
description = "Coleta textual de outra área de atuação."
actions = ["redis_update_professional_area"]
message = "Escreva sua área de atuação."
input = "Texto"

[[nodes.area_atuacao_outro.transitions]]
target = "genero"
conditions = []


[nodes.orientacao_medica_rqe]
description = "Explicação específica para profissionais médicos sobre CRM e RQE."
message = """Para profissionais médicos:

Não é necessário possuir RQE para se cadastrar. Um médico com CRM ativo pode atender em diferentes áreas, mas sem RQE não deve se anunciar como especialista.

Por exemplo: um médico sem RQE em psiquiatria pode atuar como clínico geral atendendo demandas de saúde mental, mas não deve se apresentar como psiquiatra especialista.

Pedimos apenas transparência na apresentação aos pacientes."""
buttons = ["Entendi"]

[[nodes.orientacao_medica_rqe.transitions]]
target = "genero"
conditions = ["entendi"]


[nodes.abordagem_psicoterapia]
description = "Coleta da abordagem principal para profissionais de psicoterapia."
actions = ["redis_update_professional_approach"]
message = "Qual é sua abordagem principal na psicoterapia?"
buttons = [
  "TCC",
  "Psicanálise",
  "Outra"
]

[[nodes.abordagem_psicoterapia.transitions]]
target = "genero"
conditions = ["tcc", "psicanalise"]

[[nodes.abordagem_psicoterapia.transitions]]
target = "abordagem_psicoterapia_outro"
conditions = ["outra"]


[nodes.abordagem_psicoterapia_outro]
description = "Coleta textual de outra abordagem."
actions = ["redis_update_professional_approach"]
message = "Escreva sua abordagem principal."
input = "Texto"

[[nodes.abordagem_psicoterapia_outro.transitions]]
target = "genero"
conditions = []


[nodes.genero]
description = "Coleta de gênero."
actions = ["redis_update_professional_gender"]
message = "Como você se identifica?"
buttons = [
  "Homem",
  "Mulher",
  "Homem trans",
  "Mulher trans",
  "Prefiro não informar"
]

[[nodes.genero.transitions]]
target = "identificacao"
conditions = [
  "homem",
  "mulher",
  "homem trans",
  "mulher trans",
  "prefiro nao informar"
]


[nodes.identificacao]
description = "Coleta de identificação social ou grupo minorizado."
actions = ["redis_update_professional_minority_group"]
message = "Você se identifica com algum desses grupos?"
buttons = [
  "Negro",
  "Negro LGBT",
  "LGBT",
  "Prefiro não informar",
  "Outro"
]

[[nodes.identificacao.transitions]]
target = "qualificacao"
conditions = [
  "negro",
  "negro lgbt",
  "lgbt",
  "prefiro nao informar"
]

[[nodes.identificacao.transitions]]
target = "identificacao_outro"
conditions = ["outro"]


[nodes.identificacao_outro]
description = "Coleta textual de outra identificação."
actions = ["redis_update_professional_minority_group"]
message = "Escreva como você se identifica."
input = "Texto"

[[nodes.identificacao_outro.transitions]]
target = "qualificacao"
conditions = []


[nodes.qualificacao]
description = "Coleta de formação, especializações, abordagem e currículo."
actions = ["redis_update_professional_qualification"]
message = """Conte um pouco sobre sua formação, experiência profissional, especializações, cursos complementares ou currículo.

Você pode incluir graduação, pós-graduação, certificados, abordagem teórica, experiência clínica ou outras informações relevantes para avaliação do cadastro."""
input = "Texto"

[[nodes.qualificacao.transitions]]
target = "disponibilidade"
conditions = []


[nodes.disponibilidade]
description = "Coleta de disponibilidade de agenda."
actions = ["redis_update_professional_disponibility"]
message = "Em quais dias e horários costuma atender?"
input = "Texto"

[[nodes.disponibilidade.transitions]]
target = "ferramenta_online"
conditions = []


[nodes.ferramenta_online]
description = "Coleta da ferramenta usada para atendimento online."
