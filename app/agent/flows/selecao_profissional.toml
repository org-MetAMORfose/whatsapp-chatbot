  "redis_update_professional_video_tool",
  "redis_get_professional_stage_summary"
]
message = "Qual ferramenta costuma utilizar para os atendimentos online?"
buttons = ["Google Meet", "Zoom", "WhatsApp", "Outra"]

[[nodes.ferramenta_online.transitions]]
target = "resumo_dados"
conditions = ["google meet", "zoom", "whatsapp"]

[[nodes.ferramenta_online.transitions]]
target = "ferramenta_online_outro"
conditions = ["outra"]


[nodes.ferramenta_online_outro]
description = "Coleta textual de outra ferramenta online."
actions = [
  "redis_update_professional_video_tool",
  "redis_get_professional_stage_summary"
]
message = "Escreva qual ferramenta utiliza."
