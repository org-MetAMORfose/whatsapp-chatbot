[meta]
name = "paciente"
description = "Fluxo de paciente buscando atendimento na Rede MetAMORfose."


[nodes.paciente_tipo_atendimento]
description = "Escolhe entre atendimento imediato e cadastro normal."
actions = ["postgres_route_patient_registration"]
message = """Você procura atendimento imediato ou atendimento normal?"""
buttons = ["Atendimento imediato", "Atendimento normal"]

[[nodes.paciente_tipo_atendimento.transitions]]
target = "paciente_imediato"
conditions = ["atendimento imediato"]

[[nodes.paciente_tipo_atendimento.transitions]]
target = "paciente_nome"
conditions = ["atendimento normal"]


[nodes.paciente_imediato]
description = "Encaminhamento externo para atendimento imediato."
message = """Você pode pedir atendimento imediato por este link:

[URL em construção]"""
end = true


[nodes.paciente_nome]
description = "Coleta do nome para o primeiro cadastro do paciente."
actions = ["redis_update_patient_name"]
message = "Olá, tudo bem? Para começarmos, qual é o seu nome?"
input = "Texto"

[[nodes.paciente_nome.transitions]]
target = "paciente_inicio"
conditions = []


[nodes.paciente_inicio]
description = "Coleta da área de atendimento desejada."
actions = ["redis_update_patient_area"]
message = """Prazer em te conhecer! Qual área você deseja receber atendimento?

Estamos aqui para te conectar aos profissionais da nossa Rede MetAMORfose de telemedicina, para acolher tudo o que você estiver sentindo!"""
buttons = ["Psiquiatria", "Nutrição", "Clínico geral", "Psicoterapia"]

[[nodes.paciente_inicio.transitions]]
target = "paciente_psico_abordagem"
conditions = ["psicoterapia"]

[[nodes.paciente_inicio.transitions]]
target = "paciente_faixa_valor"
conditions = ["psiquiatria", "nutricao", "clinico geral"]


[nodes.paciente_psico_abordagem]
description = "Coleta da abordagem desejada para psicoterapia."
actions = ["redis_update_patient_psychotherapy_approach"]
message = "Você procura alguma abordagem específica para a psicoterapia?"
buttons = ["TCC", "Psicanálise", "Sem preferência"]

[[nodes.paciente_psico_abordagem.transitions]]
target = "paciente_psico_perfil"
conditions = ["tcc", "psicanalise", "sem preferencia"]


[nodes.paciente_psico_perfil]
description = "Coleta de preferência de perfil profissional."
actions = ["redis_update_patient_professional_profile"]
message = "Você tem alguma preferência sobre o perfil do profissional?"
buttons = ["LGBTQIAPN+", "Mulher", "Mulher negra", "Homem negro", "Sem preferência"]

[[nodes.paciente_psico_perfil.transitions]]
target = "paciente_faixa_valor"
conditions = ["lgbtqiapn+", "mulher", "mulher negra", "homem negro", "sem preferencia"]


[nodes.paciente_faixa_valor]
description = "Coleta da faixa de valor por sessão."
actions = [
  "redis_update_patient_price_range",
  "postgres_register_new_patient_request",
  "sheets_register_patient"
]
message = """Qual dessas faixas por sessão se encaixa com a sua realidade?

Os valores variam conforme o tempo de experiência clínica, cursos, qualificações, especializações e disponibilidade dos profissionais de saúde."""
buttons = ["Até R$150", "Até R$300", "Até R$600"]

[[nodes.paciente_faixa_valor.transitions]]
target = "paciente_primeiro_finalizado"
conditions = ["ate r$150", "ate r$300", "ate r$600"]


[nodes.paciente_primeiro_finalizado]
description = "Confirmação do primeiro cadastro normal."
message = """Cadastro inicial concluído.

Em breve um dos nossos profissionais de saúde vai te chamar aqui no WhatsApp."""
end = true


[nodes.paciente_retorno_resumo]
description = "Apresenta o último cadastro e permite mantê-lo ou alterá-lo."
actions = [
  "postgres_register_returning_patient_from_last_request",
  "postgres_route_patient_preference_update"
]
message = "Você prefere manter ou atualizar as preferências para seu próximo profissional?"
buttons = ["Manter", "Atualizar"]

[[nodes.paciente_retorno_resumo.transitions]]
target = "paciente_retorno_finalizado"
conditions = ["manter"]

[[nodes.paciente_retorno_resumo.transitions]]
target = "paciente_retorno_campos_geral"
conditions = ["atualizar"]


[nodes.paciente_retorno_campos_geral]
description = "Escolhe uma preferência aplicável a qualquer área de atendimento."
message = "O que você quer ajustar para o seu próximo profissional?"
buttons = ["Nome", "Área", "Perfil profissional", "Faixa de valor"]

[[nodes.paciente_retorno_campos_geral.transitions]]
target = "paciente_corrigir_nome"
conditions = ["nome"]

[[nodes.paciente_retorno_campos_geral.transitions]]
target = "paciente_corrigir_area"
conditions = ["area"]

[[nodes.paciente_retorno_campos_geral.transitions]]
target = "paciente_corrigir_perfil"
conditions = ["perfil profissional"]

[[nodes.paciente_retorno_campos_geral.transitions]]
target = "paciente_corrigir_faixa_valor"
conditions = ["faixa de valor"]


[nodes.paciente_retorno_campos_psicoterapia]
description = "Escolhe uma preferência aplicável à psicoterapia."
message = "O que você quer ajustar para o seu próximo profissional?"
buttons = [
  "Nome",
  "Área",
  "Abordagem",
  "Perfil profissional",
  "Faixa de valor"
]

[[nodes.paciente_retorno_campos_psicoterapia.transitions]]
target = "paciente_corrigir_nome"
conditions = ["nome"]

[[nodes.paciente_retorno_campos_psicoterapia.transitions]]
target = "paciente_corrigir_area"
conditions = ["area"]

[[nodes.paciente_retorno_campos_psicoterapia.transitions]]
target = "paciente_corrigir_abordagem"
conditions = ["abordagem"]

[[nodes.paciente_retorno_campos_psicoterapia.transitions]]
target = "paciente_corrigir_perfil"
conditions = ["perfil profissional"]

[[nodes.paciente_retorno_campos_psicoterapia.transitions]]
target = "paciente_corrigir_faixa_valor"
conditions = ["faixa de valor"]


[nodes.paciente_corrigir_nome]
description = "Atualiza o nome persistido em person ao concluir o cadastro."
actions = ["redis_update_patient_name", "redis_get_patient_stage_summary"]
message = "Qual é o nome correto?"
input = "Texto"

[[nodes.paciente_corrigir_nome.transitions]]
target = "paciente_retorno_resumo"
conditions = []


[nodes.paciente_corrigir_area]
description = "Atualiza a área desejada."
actions = ["redis_update_patient_area", "redis_get_patient_stage_summary"]
message = "Qual área você deseja receber atendimento?"
buttons = ["Psiquiatria", "Nutrição", "Clínico geral", "Psicoterapia"]

[[nodes.paciente_corrigir_area.transitions]]
target = "paciente_retorno_resumo"
conditions = ["psiquiatria", "nutricao", "clinico geral", "psicoterapia"]


[nodes.paciente_corrigir_abordagem]
description = "Atualiza a abordagem desejada para psicoterapia."
actions = ["redis_update_patient_psychotherapy_approach", "redis_get_patient_stage_summary"]
message = "Qual abordagem você procura?"
buttons = ["TCC", "Psicanálise", "Sem preferência"]

[[nodes.paciente_corrigir_abordagem.transitions]]
target = "paciente_retorno_resumo"
conditions = ["tcc", "psicanalise", "sem preferencia"]


[nodes.paciente_corrigir_perfil]
description = "Atualiza a preferência de perfil profissional."
actions = ["redis_update_patient_professional_profile", "redis_get_patient_stage_summary"]
message = "Qual perfil profissional você prefere?"
buttons = ["LGBTQIAPN+", "Mulher", "Mulher negra", "Homem negro", "Sem preferência"]

[[nodes.paciente_corrigir_perfil.transitions]]
target = "paciente_retorno_resumo"
conditions = ["lgbtqiapn+", "mulher", "mulher negra", "homem negro", "sem preferencia"]


[nodes.paciente_corrigir_faixa_valor]
description = "Atualiza a faixa de valor desejada."
actions = ["redis_update_patient_price_range", "redis_get_patient_stage_summary"]
message = "Qual faixa de valor se encaixa com a sua realidade?"
buttons = ["Até R$150", "Até R$300", "Até R$600"]

[[nodes.paciente_corrigir_faixa_valor.transitions]]
target = "paciente_retorno_resumo"
conditions = ["ate r$150", "ate r$300", "ate r$600"]


[nodes.paciente_retorno_finalizado]
description = "Confirmação de solicitação normal para paciente retornando."
message = """Recebi suas preferências. A equipe vai revisar e seguir com você por aqui."""
end = true
